<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <title>J.A.R.V.I.S.</title> <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500&display=swap" rel="stylesheet" /> <style> *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; } :root { --cyan: #00e5ff; --cyan-dim: #00b8d4; --cyan-glow: rgba(0,229,255,0.35); --dark: #020c14; --panel: rgba(0,20,40,0.75); --border: rgba(0,229,255,0.18); --text: #cce8f4; --text-dim: #5a8fa8; } html, body { height: 100%; background: var(--dark); color: var(--text); font-family: 'Rajdhani', sans-serif; overflow: hidden; } #particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; } #app { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; height: 100vh; padding: 24px 16px 20px; gap: 18px; } header { text-align: center; letter-spacing: 0.25em; } header h1 { font-family: 'Orbitron', sans-serif; font-size: clamp(1.4rem,4vw,2.4rem); font-weight: 900; color: var(--cyan); text-shadow: 0 0 18px var(--cyan-glow), 0 0 40px var(--cyan-glow); } header p { font-size: 0.72rem; color: var(--text-dim); letter-spacing: 0.4em; margin-top: 4px; } #orb-wrap { position: relative; width: 160px; height: 160px; flex-shrink: 0; } .ring { position: absolute; inset: 0; border-radius: 50%; border: 1.5px solid var(--cyan-dim); opacity: 0.25; animation: spin 8s linear infinite; } .ring:nth-child(2) { inset: 10px; border-color: var(--cyan); opacity: 0.18; animation-duration: 12s; animation-direction: reverse; } .ring:nth-child(3) { inset: 22px; border-color: #40c4ff; opacity: 0.12; animation-duration: 18s; } @keyframes spin { to { transform: rotate(360deg); } } #orb { position: absolute; inset: 30px; border-radius: 50%; background: radial-gradient(circle at 38% 36%, #1de9ff 0%, #0077aa 45%, #001a2e 100%); box-shadow: 0 0 30px var(--cyan-glow), 0 0 60px rgba(0,180,220,0.2), inset 0 0 20px rgba(0,0,0,0.5); transition: box-shadow 0.3s; } #orb.listening { animation: orbPulse 1s ease-in-out infinite; box-shadow: 0 0 50px rgba(0,255,100,0.5), 0 0 90px rgba(0,255,100,0.25), inset 0 0 20px rgba(0,0,0,0.4); background: radial-gradient(circle at 38% 36%, #00ff88 0%, #00aa55 45%, #001a2e 100%); } #orb.speaking { animation: orbSpeak 0.6s ease-in-out infinite alternate; box-shadow: 0 0 50px rgba(0,180,255,0.6), 0 0 90px rgba(0,180,255,0.3), inset 0 0 20px rgba(0,0,0,0.4); } @keyframes orbPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } } @keyframes orbSpeak { from { transform: scale(1); } to { transform: scale(1.06); } } #status { font-family: 'Orbitron', sans-serif; font-size: 0.65rem; letter-spacing: 0.3em; color: var(--cyan-dim); text-transform: uppercase; min-height: 1.2em; text-shadow: 0 0 8px var(--cyan-glow); } #log-wrap { flex: 1; width: 100%; max-width: 720px; overflow: hidden; display: flex; flex-direction: column; } #log-label { font-family: 'Orbitron', sans-serif; font-size: 0.55rem; letter-spacing: 0.35em; color: var(--text-dim); margin-bottom: 8px; padding-left: 4px; } #log { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 14px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; backdrop-filter: blur(10px); scrollbar-width: thin; scrollbar-color: var(--cyan-dim) transparent; } #log::-webkit-scrollbar { width: 4px; } #log::-webkit-scrollbar-thumb { background: var(--cyan-dim); border-radius: 4px; } .msg { display: flex; flex-direction: column; gap: 3px; animation: fadeIn 0.3s ease; } @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } } .msg-label { font-family: 'Orbitron', sans-serif; font-size: 0.52rem; letter-spacing: 0.3em; color: var(--text-dim); } .msg.user .msg-label { color: #80cbc4; } .msg.jarvis .msg-label { color: var(--cyan); } .msg.error .msg-label { color: #ef5350; } .msg-text { font-size: 0.95rem; line-height: 1.55; color: var(--text); padding: 8px 12px; border-radius: 6px; border-left: 2px solid transparent; } .msg.user .msg-text { border-color: #80cbc4; background: rgba(0,150,136,0.08); } .msg.jarvis .msg-text { border-color: var(--cyan); background: rgba(0,229,255,0.06); } .msg.error .msg-text { border-color: #ef5350; background: rgba(239,83,80,0.08); color: #ef9a9a; } #mic-btn { width: 64px; height: 64px; border-radius: 50%; border: 2px solid var(--cyan); background: rgba(0,229,255,0.08); color: var(--cyan); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.25s; box-shadow: 0 0 16px var(--cyan-glow); flex-shrink: 0; outline: none; } #mic-btn:hover { background: rgba(0,229,255,0.18); box-shadow: 0 0 28px var(--cyan-glow); } #mic-btn.recording { border-color: #00e676; color: #00e676; background: rgba(0,230,118,0.12); box-shadow: 0 0 28px rgba(0,230,118,0.45); animation: micPulse 1s ease-in-out infinite; } #mic-btn:disabled { opacity: 0.4; cursor: not-allowed; animation: none; } @keyframes micPulse { 0%, 100% { box-shadow: 0 0 20px rgba(0,230,118,0.4); } 50% { box-shadow: 0 0 40px rgba(0,230,118,0.7); } } body::after { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px); pointer-events: none; z-index: 999; } </style> </head> <body> <canvas id="particles"></canvas> <div id="app"> <header> <h1>J.A.R.V.I.S.</h1> <p>Just A Rather Very Intelligent System</p> </header> <div id="orb-wrap"> <div class="ring"></div> <div class="ring"></div> <div class="ring"></div> <div id="orb"></div> </div> <div id="status">SYSTEM READY</div> <div id="log-wrap"> <div id="log-label">CONVERSATION LOG</div> <div id="log"> <div class="msg jarvis"> <span class="msg-label">J.A.R.V.I.S.</span> <span class="msg-text">Good day, Mr. Duran. All systems are online and fully operational. How may I assist you?</span> </div> </div> </div> <button id="mic-btn" title="Click to speak"> <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"> <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93V20H9v2h6v-2h-2v-2.07A7 7 0 0 0 19 11h-2z"/> </svg> </button> </div> <script> const WEBHOOK = 'https://hook.us2.make.com/k9aul5likv7h56gj951v3g4nclgpq9t8'; let mediaRecorder = null; let audioChunks = []; let isRecording = false; let isBusy = false; let activeStream = null; const micBtn = document.getElementById('mic-btn'); const statusEl = document.getElementById('status'); const logEl = document.getElementById('log'); const orbEl = document.getElementById('orb'); // Particles (function() { const canvas = document.getElementById('particles'); const ctx = canvas.getContext('2d'); let W, H, pts; function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; } function mkPt() { return { x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.4+0.3, vx:(Math.random()-.5)*.3, vy:(Math.random()-.5)*.3, a:Math.random()*.5+.1 }; } function init() { resize(); pts = Array.from({length:120}, mkPt); } function draw() { ctx.clearRect(0,0,W,H); pts.forEach(p => { ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle=`rgba(0,229,255,${p.a})`; ctx.fill(); p.x+=p.vx; p.y+=p.vy; if(p.x<0)p.x=W; if(p.x>W)p.x=0; if(p.y<0)p.y=H; if(p.y>H)p.y=0; }); requestAnimationFrame(draw); } window.addEventListener('resize', resize); init(); draw(); })(); function setStatus(t) { statusEl.textContent = t.toUpperCase(); } function setOrb(s) { orbEl.className = s || ''; } function setBusy(v) { isBusy = v; micBtn.disabled = v; } function addMsg(role, text) { const w = document.createElement('div'); w.className = `msg ${role}`; const l = document.createElement('span'); l.className = 'msg-label'; l.textContent = role==='user' ? 'YOU' : role==='jarvis' ? 'J.A.R.V.I.S.' : 'ERROR'; const b = document.createElement('span'); b.className = 'msg-text'; b.textContent = text; w.appendChild(l); w.appendChild(b); logEl.appendChild(w); logEl.scrollTop = logEl.scrollHeight; } async function startRecording() { if (isRecording || isBusy) return; let stream; try { stream = await navigator.mediaDevices.getUserMedia({audio:true, video:false}); } catch(e) { addMsg('error', `Microphone access denied: ${e.message}`); setStatus('MIC ACCESS DENIED'); return; } activeStream = stream; audioChunks = []; const mime = ['audio/webm;codecs=opus','audio/webm','audio/ogg'].find(t=>MediaRecorder.isTypeSupported(t)) || ''; try { mediaRecorder = mime ? new MediaRecorder(stream, {mimeType:mime}) : new MediaRecorder(stream); } catch(e) { addMsg('error', `Recorder init failed: ${e.message}`); stream.getTracks().forEach(t=>t.stop()); return; } mediaRecorder.ondataavailable = e => { if(e.data?.size>0) audioChunks.push(e.data); }; mediaRecorder.onerror = e => { addMsg('error', `Recorder error: ${e.error?.message||'unknown'}`); finishRecording(); }; mediaRecorder.start(250); isRecording = true; micBtn.classList.add('recording'); setOrb('listening'); setStatus('LISTENING…'); } function finishRecording() { return new Promise(resolve => { if (!mediaRecorder || mediaRecorder.state === 'inactive') { resolve(null); return; } mediaRecorder.onstop = () => { if (activeStream) { activeStream.getTracks().forEach(t=>t.stop()); activeStream=null; } const mime = mediaRecorder.mimeType || 'audio/webm'; const blob = new Blob(audioChunks, {type:mime}); audioChunks = []; resolve(blob); }; mediaRecorder.stop(); }); } async function stopAndProcess() { if (!isRecording) return; isRecording = false; micBtn.classList.remove('recording'); setStatus('PROCESSING…'); const blob = await finishRecording(); if (!blob || blob.size < 500) { addMsg('error', 'Recording too short — please try again.'); setsetBusy(true); try { setStatus('SENDING TO JARVIS…'); setOrb(''); const fd = new FormData(); fd.append('audio', new File([blob], 'audio.webm', {type: blob.type})); const res = await fetch(WEBHOOK, { method: 'POST', body: fd }); if (!res.ok) throw new Error(`Server error: ${res.status}`); const contentType = res.headers.get('content-type') || ''; if (contentType.includes('audio')) { const audioBuffer = await res.arrayBuffer(); const audioBlob = new Blob([audioBuffer], {type: 'audio/mpeg'}); const audioUrl = URL.createObjectURL(audioBlob); const audio = new Audio(audioUrl); setOrb('speaking'); setStatus('SPEAKING…'); audio.onended = () => { URL.revokeObjectURL(audioUrl); setOrb(''); setStatus('SYSTEM READY'); setBusy(false); }; audio.play(); } else { const data = await res.json(); const reply = data.response || data.answer || data.text || 'No response.'; addMsg('jarvis', reply); setOrb(''); setStatus('SYSTEM READY'); setBusy(false); } } catch(e) { addMsg('error', e.message || 'Unexpected error.'); setOrb(''); setStatus('SYSTEM READY'); setBusy(false); } } micBtn.addEventListener('click', async () => { if (isBusy) return; if (!isRecording) await startRecording(); else await stopAndProcess(); }); </script> </body> </html>
